name: Daily Restaurant Alert

on:
  schedule:
  - cron: "17 23 * * *"
  - cron: "47 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run restaurant monitor
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          SEARCH_QUERIES: "대구 신상 맛집,대구 새로오픈 식당,대구 신규 식당,대구 오픈 맛집,동성로 신상 맛집,동성로 새로오픈 식당,반월당 신상 맛집,중구 신상 맛집,수성구 신상 맛집,범어동 신상 맛집,들안길 신상 맛집,황금동 신상 맛집,상동 신상 맛집,달서구 신상 맛집,상인동 신상 맛집,월성동 신상 맛집,성서 신상 맛집,계명대 신상 맛집,서구 신상 맛집,평리동 신상 맛집,북구 신상 맛집,칠곡 신상 맛집,동구 신상 맛집,동대구역 신상 맛집,혁신도시 신상 맛집,경산 신상 맛집,경산 새로오픈 식당,경산 신규 식당,영남대 신상 맛집,하양 신상 맛집,중산동 신상 맛집,구미 신상 맛집,구미 새로오픈 식당,구미 신규 식당,구미 옥계 신상 맛집,구미 인동 신상 맛집,구미 봉곡 신상 맛집"
        run: python monitor.py

      - name: Commit updated known places
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add known_places.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update known places"
          git push
